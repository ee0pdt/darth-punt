<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARTH PUNT</title>
<meta name="description" content="DARTH PUNT — cinematic generative sequencer in the browser.">
<meta name="theme-color" content="#010608">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --bg: #05090d;
  --surface: #0a1219;
  --surface-2: #0e1822;
  --line: rgba(120, 180, 200, 0.10);
  --cyan: #5cd3ff;
  --cyan-dim: rgba(92, 211, 255, 0.45);
  --cyan-low: rgba(92, 211, 255, 0.18);
  --warn: #ff8a3d;
  --text: #cfe6f0;
  --text-dim: rgba(207, 230, 240, 0.55);
  --glow-cyan: 0 0 8px var(--cyan), 0 0 24px rgba(92, 211, 255, 0.2);
  --glow-warn: 0 0 8px var(--warn), 0 0 24px rgba(255, 138, 61, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "Share Tech Mono", monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 20px 0 40px;
  overflow-x: hidden;
  position: relative;
}

/* Tension overlay */
.tension-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(255, 138, 61, 0.12) 100%);
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  transition: opacity 1s ease;
}
.tension-overlay.active { opacity: 1; }

.container {
  position:relative; z-index:10;
  width: min(1020px, 96vw);
  display:flex; flex-direction:column; gap:14px;
}

/* Header */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:12px;
  border-bottom:1px solid var(--line);
}

.logo {
  display:flex; flex-direction:column; gap:2px;
}

h1 {
  font-family:'Orbitron',sans-serif; font-weight:900;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  letter-spacing:0.25em;
  background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter: drop-shadow(0 0 12px rgba(92,211,255,0.4));
}

.subtitle { font-size: 0.6875rem; letter-spacing: 0.16em; color: var(--text-dim); }

.header-readouts {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.readout-inline {
  font-family: "Orbitron", sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  display: inline-flex;
  gap: 6px;
  align-items: baseline;
}
.readout-inline .lbl {
  font-size: 0.6875rem;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.readout-inline .val {
  color: var(--cyan);
  font-weight: 700;
}

/* Visualiser */
.viz-wrap {
  height:90px;
  background:var(--surface);
  border:1px solid var(--line);
  position:relative; overflow:hidden;
}
canvas#viz { width:100%; height:100%; display:block; }

.chord-flash {
  position:absolute; inset:0;
  background:rgba(92,211,255,0.2);
  opacity:0; pointer-events:none;
}
.chord-flash.active { opacity:1; transition:none; }
.chord-flash.fade   { opacity:0; transition:opacity 0.6s ease; }

/* Automation bars */
.auto-bars {
  display:flex; flex-direction:column; gap:5px;
}

.auto-row {
  display:flex; align-items:center; gap:8px;
}

.auto-label { width: 70px; font-size: 0.6875rem; letter-spacing: 0.08em; color: var(--text-dim); text-align: right; flex-shrink: 0; }

.auto-track {
  flex:1; height:3px;
  background:rgba(92,211,255,0.06);
  position:relative;
}

.auto-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, rgba(92, 211, 255, 0.1), var(--cyan));
  transition: width 0.4s linear;
}

.auto-meter {
  display: inline-block;
  position: relative;
  width: 42px;
  height: 3px;
  margin: 0 8px;
  background: rgba(92, 211, 255, 0.06);
  vertical-align: middle;
}
.auto-meter-fill {
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, rgba(92, 211, 255, 0.1), var(--cyan));
  transition: width 0.4s linear;
}
.auto-meter-val {
  display: none;
}

.auto-val { width: 42px; font-size: 0.6875rem; color: var(--text-dim); text-align: left; flex-shrink: 0; }

/* Sequencer */
.sequencer { display:flex; flex-direction:column; gap:4px; }

.track { display:flex; align-items:center; gap:6px; }

.track-left {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 80px;
  flex-shrink: 0;
}

.mute-btn {
  width: 24px;
  height: 24px;
  border: 1px solid var(--cyan-low);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
  padding: 0;
}
.mute-btn:hover {
  border-color: var(--cyan);
}
.mute-btn.muted {
  background: var(--cyan-low);
  border-color: var(--cyan-dim);
}
.mute-btn::after {
  content: "";
  width: 10px;
  height: 10px;
  background: var(--cyan-dim);
}
.mute-btn.muted::after {
  background: var(--text-dim);
}

.track-label { font-size: 0.6875rem; letter-spacing: 0.08em; color: var(--text-dim); text-align: right; flex: 1; }

.steps {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 3px;
  flex: 1;
}

.step {
  aspect-ratio: 1;
  min-height: 32px;
  border: 1px solid var(--cyan-low);
  background: var(--surface);
  cursor: pointer;
  transition: background 0.06s, box-shadow 0.06s;
}

.step.on {
  background: rgba(92, 211, 255, 0.16);
  border-color: var(--cyan-dim);
}
.step.active {
  background: var(--cyan) !important;
  border-color: var(--cyan) !important;
  box-shadow: var(--glow-cyan) !important;
}

.steps .step:nth-child(4n+1) {
  border-left: 2px solid var(--cyan-low);
}

/* Controls row */
.controls {
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}

/* Primary buttons — PLAY, TENSION */
.btn-primary {
  font-family: "Orbitron", sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  height: 44px;
  padding: 0 24px;
  border: 1px solid var(--cyan);
  background: transparent;
  color: var(--cyan);
  cursor: pointer;
  transition: background 0.1s, box-shadow 0.1s;
  white-space: nowrap;
}
.btn-primary:hover {
  background: rgba(92, 211, 255, 0.08);
  box-shadow: var(--glow-cyan);
}
.btn-primary.active {
  background: var(--cyan);
  color: var(--bg);
  box-shadow: var(--glow-cyan);
}
.btn-primary.warn {
  border-color: var(--warn);
  color: var(--warn);
}
.btn-primary.warn:hover {
  background: rgba(255, 138, 61, 0.08);
  box-shadow: var(--glow-warn);
}
.btn-primary.warn.active {
  background: var(--warn);
  color: var(--bg);
  box-shadow: var(--glow-warn);
}

/* Secondary — pattern dropdown trigger, drawer tab triggers, etc. */
.btn-secondary {
  font-family: "Share Tech Mono", monospace;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  height: 32px;
  padding: 0 12px;
  border: 1px solid var(--cyan-low);
  background: transparent;
  color: var(--cyan-dim);
  cursor: pointer;
  transition: all 0.1s;
  white-space: nowrap;
}
.btn-secondary:hover, .btn-secondary.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(92, 211, 255, 0.06);
}

/* Slider rows — used in MIX drawer tab */
.slider-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px 0;
  min-height: 44px;
  justify-content: center;
}
.slider-row .slider-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: "Share Tech Mono", monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.08em;
}
.slider-row .slider-head .lbl { color: var(--text-dim); }
.slider-row .slider-head .val { color: var(--cyan); }

input[type="range"].slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  background: linear-gradient(
    to right,
    var(--cyan-low) 0%,
    var(--cyan-low) var(--pct, 0%),
    var(--surface-2) var(--pct, 0%),
    var(--surface-2) 100%
  );
  outline: none;
  cursor: pointer;
  margin: 0;
  padding: 0;
}
input[type="range"].slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 4px;
  height: 16px;
  background: var(--cyan);
  box-shadow: var(--glow-cyan);
  cursor: pointer;
  border: none;
  border-radius: 0;
}
input[type="range"].slider::-moz-range-thumb {
  width: 4px;
  height: 16px;
  background: var(--cyan);
  box-shadow: var(--glow-cyan);
  cursor: pointer;
  border: none;
  border-radius: 0;
}
input[type="range"].slider:focus-visible {
  outline: 2px solid var(--cyan);
  outline-offset: 4px;
}

.slider-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px 24px;
}

/* Toggle switch — iOS-class, Tron themed */
.toggle-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
}

.toggle {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 22px;
  flex-shrink: 0;
}
.toggle input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  margin: 0;
  width: 100%;
  height: 100%;
}
.toggle-track {
  position: absolute;
  inset: 0;
  border: 1px solid var(--cyan-low);
  background: transparent;
  transition: border-color 0.12s, background 0.12s;
}
.toggle-knob {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: transparent;
  border: 1px solid rgba(207, 230, 240, 0.35);
  transition:
    transform 120ms cubic-bezier(0.4, 0, 0.2, 1),
    background 0.12s,
    border-color 0.12s,
    box-shadow 0.12s;
}
.toggle input:checked ~ .toggle-track {
  border-color: var(--cyan);
  background: rgba(92, 211, 255, 0.06);
}
.toggle input:checked ~ .toggle-knob {
  transform: translateX(22px);
  background: var(--cyan);
  border-color: var(--cyan);
  box-shadow: var(--glow-cyan);
}
.toggle input:focus-visible ~ .toggle-track {
  outline: 2px solid var(--cyan);
  outline-offset: 2px;
}

.toggle-label {
  font-family: "Share Tech Mono", monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  transition: color 0.12s;
}
.toggle-row:has(.toggle input:checked) .toggle-label {
  color: var(--text);
}

.toggle-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 4px;
}

/* Status */
.status-row { display:flex; justify-content:space-between; align-items:center; }
.status { font-size: 0.6875rem; letter-spacing: 0.16em; color: var(--text-dim); }
.status.playing { color:var(--cyan); animation:pulse 1.4s ease-in-out infinite; }
.event-log { font-size: 0.6875rem; letter-spacing: 0.1em; color: var(--cyan); text-shadow: var(--glow-cyan); opacity: 0; transition: opacity 0.25s; }
.event-log.show { opacity:1; }
@keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:1} }

@keyframes tensionPulse {
  0%, 100% {
    box-shadow: none;
  }
  50% {
    box-shadow: var(--glow-warn);
  }
}
#tensionBtn:not(.active) {
  animation: tensionPulse 2s ease-in-out infinite;
}
#tensionBtn.releasing {
  background: var(--warn);
  color: var(--bg);
  box-shadow: var(--glow-warn);
  animation: none;
}

/* Drawer handle */
.drawer-handle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  height: 32px;
  border: none;
  border-top: 1px solid var(--line);
  background: transparent;
  color: var(--text-dim);
  font-family: "Share Tech Mono", monospace;
  font-size: 0.6875rem;
  letter-spacing: 0.16em;
  cursor: pointer;
  transition: color 0.1s, background 0.1s;
}
.drawer-handle:hover {
  color: var(--cyan);
  background: rgba(92, 211, 255, 0.04);
}
.drawer-handle-icon {
  font-size: 0.9rem;
  opacity: 0.7;
}

/* Drawer body */
.drawer {
  width: 100%;
  background: var(--surface);
  border-top: 1px solid var(--line);
  max-height: 0;
  overflow: hidden;
  transition: max-height 240ms ease-out;
}
.drawer.open {
  max-height: 360px;
}

.drawer-tabs {
  display: flex;
  gap: 6px;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}

.drawer-close {
  margin-left: auto;
  width: 32px;
  height: 32px;
  background: transparent;
  border: 1px solid var(--cyan-low);
  color: var(--cyan-dim);
  cursor: pointer;
  font-size: 0.9rem;
  transition: color 0.1s, border-color 0.1s;
}
.drawer-close:hover {
  color: var(--cyan);
  border-color: var(--cyan);
}

.drawer-body {
  padding: 14px;
}
.drawer-pane {
  display: none;
}
.drawer-pane.active {
  display: block;
}

.pattern-trigger-lbl {
  color: var(--text-dim);
  margin-right: 8px;
}
.pattern-trigger-val {
  color: var(--cyan);
  margin-right: 8px;
}
.pattern-trigger-chev {
  color: var(--cyan-dim);
}
#patternTrigger {
  gap: 6px;
  padding: 0 14px;
}

.pattern-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.pattern-divider {
  border: none;
  border-top: 1px solid var(--line);
  margin: 18px 0 12px;
}
.btn-secondary.danger {
  border-color: rgba(255, 138, 61, 0.4);
  color: var(--warn);
}
.btn-secondary.danger:hover {
  border-color: var(--warn);
  color: var(--warn);
  background: rgba(255, 138, 61, 0.08);
  box-shadow: var(--glow-warn);
}
</style>
</head>
<body>

<div class="tension-overlay" id="tensionOverlay"></div>

<div class="container">

  <header>
    <div class="logo">
      <h1>DARTH PUNT</h1>
      <div class="subtitle">CINEMATIC GENERATIVE SEQUENCER</div>
    </div>
    <div class="header-readouts">
  <span class="readout-inline"><span class="lbl">BAR</span> <span class="val" id="barVal"
    >—</span></span>
  <span class="readout-inline"><span class="lbl">BPM</span> <span class="val" id="bpmReadout"
    >120</span></span>
  <span class="readout-inline"><span class="lbl">D</span> <span class="val" id="dramaReadout"
    >5</span></span>
</div>
  </header>

  <!-- Visualiser -->
  <div class="viz-wrap">
    <canvas id="viz"></canvas>
    <div class="chord-flash" id="chordFlash"></div>
  </div>

  <!-- Automation bars -->
  <div class="auto-bars">
    <div class="auto-row">
      <div class="auto-label">FILTER</div>
      <div class="auto-track"><div class="auto-fill" id="fillFilter"></div></div>
      <div class="auto-val" id="valFilter">—</div>
    </div>
    <div class="auto-row">
      <div class="auto-label">PUMP</div>
      <div class="auto-track"><div class="auto-fill" id="fillPump"></div></div>
      <div class="auto-val" id="valPump">—</div>
    </div>
  </div>

  <!-- Sequencer -->
  <div class="sequencer" id="sequencer"></div>

  <!-- Transport + Tension -->
  <div class="controls">
    <button class="btn-primary" id="playBtn">PLAY</button>
    <button class="btn-primary warn" id="tensionBtn">TENSION</button>
    <button class="btn-secondary" id="patternTrigger" aria-haspopup="true">
      <span class="pattern-trigger-lbl">PATTERN</span>
      <span class="pattern-trigger-val" id="patternTriggerVal">—</span>
      <span class="pattern-trigger-chev">▾</span>
    </button>
  </div>

  <div class="status-row">
    <div class="status" id="status">— PRESS PLAY —</div>
    <div class="event-log" id="eventLog"></div>
  </div>

  <!-- Drawer handle (always visible at bottom of stage) -->
  <button class="drawer-handle" id="drawerHandle" aria-controls="drawer" aria-expanded="false">
    <span class="drawer-handle-icon">≡</span>
    <span class="drawer-handle-label">CONTROLS</span>
  </button>

  <!-- Drawer (controls tucked away) -->
  <section class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-tabs" role="tablist">
      <button class="btn-secondary drawer-tab active" data-tab="mix" role="tab" aria-selected="true">
        MIX
      </button>
      <button class="btn-secondary drawer-tab" data-tab="auto" role="tab" aria-selected="false">
        AUTO
      </button>
      <button class="btn-secondary drawer-tab" data-tab="patterns" role="tab" aria-selected="false">
        PATTERNS
      </button>
      <button class="drawer-close" id="drawerClose" aria-label="Close controls drawer">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-pane active" data-pane="mix" role="tabpanel">
  <div class="slider-grid">
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">BPM</span><span class="val" id="bpmVal">120</span></div>
      <input type="range" class="slider" id="bpmSlider" min="60" max="180" value="120" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">PUMP</span><span class="val" id="pumpVal">0.65</span></div>
      <input type="range" class="slider" id="pumpSlider" min="0" max="0.9" value="0.65" step="0.01" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">BPM DRIFT</span><span class="val" id="driftVal">2</span></div>
      <input type="range" class="slider" id="driftSlider" min="0" max="8" value="2" step="0.5" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">CUTOFF</span><span class="val" id="cutoffVal">300</span></div>
      <input type="range" class="slider" id="cutoffSlider" min="100" max="12000" value="300" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">RESONANCE</span><span class="val" id="resVal">5.0</span></div>
      <input type="range" class="slider" id="resSlider" min="0.5" max="18" value="5" step="0.1" />
    </div>
    <div class="slider-row">
      <div class="slider-head">
        <span class="lbl">REVERB</span>
        <span class="auto-meter" aria-hidden="true">
          <span class="auto-meter-fill" id="fillReverb"></span>
          <span class="auto-meter-val" id="valReverb"></span>
        </span>
        <span class="val" id="reverbVal">0.45</span>
      </div>
      <input type="range" class="slider" id="reverbSlider" min="0" max="1" value="0.45" step="0.01" />
    </div>
    <div class="slider-row">
      <div class="slider-head">
        <span class="lbl">DETUNE</span>
        <span class="auto-meter" aria-hidden="true">
          <span class="auto-meter-fill" id="fillDetune"></span>
          <span class="auto-meter-val" id="valDetune"></span>
        </span>
        <span class="val" id="detuneVal">8</span>
      </div>
      <input type="range" class="slider" id="detuneSlider" min="0" max="35" value="8" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">DRAMA</span><span class="val" id="dramaVal">5</span></div>
      <input type="range" class="slider" id="dramaSlider" min="1" max="10" value="5" step="1" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">CHORD VOL</span><span class="val" id="chordVolVal">0.30</span></div>
      <input type="range" class="slider" id="chordVolSlider" min="0" max="0.8" value="0.3" step="0.01" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">CHORD SUSTAIN</span><span class="val" id="chordSusVal">3.0</span></div>
      <input type="range" class="slider" id="chordSusSlider" min="0.5" max="6" value="3" step="0.1" />
    </div>
    <div class="slider-row">
      <div class="slider-head"><span class="lbl">PAD VOL</span><span class="val" id="padVolVal">0.18</span></div>
      <input type="range" class="slider" id="padVolSlider" min="0" max="0.5" value="0.18" step="0.01" />
    </div>
  </div>
</div>
      <div class="drawer-pane" data-pane="auto" role="tabpanel">
  <div class="toggle-grid">
    <label class="toggle-row">
      <span class="toggle"><input type="checkbox" data-toggle="mutateEnabled" checked role="switch" />
        <span class="toggle-track"></span><span class="toggle-knob"></span></span>
      <span class="toggle-label">MUTATE</span>
    </label>
    <label class="toggle-row">
